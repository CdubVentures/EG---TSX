<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- LearnCode — Online Courses Ad (300x300) -->
  <rect width="300" height="300" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Code brackets icon -->
  <g transform="translate(150, 60)" fill="none" stroke="#0d9488" stroke-width="3" stroke-linecap="round">
    <polyline points="-20,-22 -35,0 -20,22"/>
    <polyline points="20,-22 35,0 20,22"/>
    <line x1="8" y1="-24" x2="-8" y2="24"/>
  </g>

  <!-- Laptop silhouette -->
  <g transform="translate(150, 58)" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.3">
    <rect x="-45" y="-32" width="90" height="60" rx="4"/>
    <path d="M-55,30 L-45,28 L45,28 L55,30 Z"/>
  </g>

  <!-- Ad label -->
  <text x="282" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="150" y="110" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle" font-weight="700" letter-spacing="2">LEARNCODE</text>

  <!-- Headline -->
  <text x="150" y="140" font-family="Georgia, Times New Roman, serif" font-size="20" fill="#111827" text-anchor="middle" font-weight="700">Learn to Code</text>

  <!-- Offer -->
  <rect x="75" y="150" width="150" height="26" rx="13" fill="#f0fdfa" stroke="#99f6e4" stroke-width="1"/>
  <text x="150" y="168" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0d9488" text-anchor="middle" font-weight="700">First Month FREE</text>

  <!-- Body -->
  <text x="150" y="200" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Python, JavaScript, React &amp; more</text>
  <text x="150" y="217" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Project-based learning paths</text>

  <!-- Student count -->
  <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">50,000+ Students Enrolled</text>

  <!-- CTA Button -->
  <rect x="80" y="252" width="140" height="36" rx="6" fill="#0d9488"/>
  <text x="150" y="275" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="600">Start Learning</text>
</svg>

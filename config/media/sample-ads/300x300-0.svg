<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="url(#bg)"/>
  <rect width="300" height="3" fill="url(#accent)"/>

  <!-- Geometric decorations -->
  <polygon points="300,0 300,140 200,0" fill="#1a1f2e" opacity="0.4"/>
  <polygon points="0,300 0,220 100,300" fill="#1a1f2e" opacity="0.3"/>
  <circle cx="150" cy="135" r="50" fill="url(#glow)"/>

  <!-- "SALE" badge -->
  <rect x="20" y="20" width="60" height="26" rx="4" fill="#ef4444"/>
  <text x="50" y="38" font-family="system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">SALE</text>

  <!-- Headline -->
  <text x="20" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="#ffffff" letter-spacing="1">GAME</text>
  <text x="20" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="#ef4444" letter-spacing="1">READY</text>

  <!-- Product silhouette -->
  <g transform="translate(60, 130)" opacity="0.06">
    <ellipse cx="90" cy="40" rx="70" ry="45" fill="#ef4444"/>
  </g>

  <!-- Subtitle -->
  <text x="20" y="178" font-family="system-ui, sans-serif" font-size="13" font-weight="500" fill="#8b949e">Pro Gaming Mouse — 49g</text>

  <!-- Price area -->
  <text x="20" y="218" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#6b7280" text-decoration="line-through">$149</text>
  <text x="80" y="218" font-family="system-ui, sans-serif" font-size="26" font-weight="900" fill="#ffffff">$99</text>

  <!-- CTA Button -->
  <rect x="20" y="238" width="260" height="40" rx="20" fill="#ef4444"/>
  <text x="150" y="264" font-family="system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">SHOP THE SALE</text>

  <!-- Sponsored -->
  <text x="280" y="294" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#4a5568" text-anchor="end">Sponsored</text>

  <!-- Bottom accent -->
  <rect y="297" width="300" height="3" fill="url(#accent)"/>
</svg>

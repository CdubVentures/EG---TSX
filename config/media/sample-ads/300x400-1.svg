<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <!-- FitTrack — Fitness App Ad (300x400) -->
  <rect width="300" height="400" fill="#f0fdf4" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Sponsored</text>

  <!-- Brand -->
  <circle cx="30" cy="34" r="10" fill="#059669"/>
  <text x="30" y="38" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="700" fill="#ffffff" text-anchor="middle">F</text>
  <text x="48" y="39" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#065f46">FitTrack</text>

  <!-- Phone shape placeholder -->
  <rect x="95" y="60" width="110" height="180" rx="14" fill="#d1fae5" stroke="#a7f3d0" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="103" y="75" width="94" height="150" rx="4" fill="#ecfdf5"/>
  <!-- Screen content -->
  <!-- Heart rate -->
  <text x="150" y="98" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6b7280" text-anchor="middle">Heart Rate</text>
  <text x="150" y="120" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#059669" text-anchor="middle">128</text>
  <text x="174" y="120" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#059669">bpm</text>
  <!-- Mini chart -->
  <polyline points="112,140 122,135 132,145 142,130 152,138 162,128 172,135 182,125 188,132" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
  <!-- Stats row -->
  <rect x="110" y="155" width="35" height="30" rx="4" fill="#d1fae5"/>
  <text x="127" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">5.2k</text>
  <text x="127" y="180" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#6b7280" text-anchor="middle">steps</text>
  <rect x="150" y="155" width="35" height="30" rx="4" fill="#d1fae5"/>
  <text x="167" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#059669" text-anchor="middle">342</text>
  <text x="167" y="180" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#6b7280" text-anchor="middle">cal</text>
  <!-- Progress ring -->
  <circle cx="150" cy="208" r="10" fill="none" stroke="#d1fae5" stroke-width="3"/>
  <circle cx="150" cy="208" r="10" fill="none" stroke="#059669" stroke-width="3" stroke-dasharray="47 63" stroke-linecap="round" transform="rotate(-90 150 208)"/>
  <!-- Camera notch -->
  <rect x="140" y="63" width="20" height="5" rx="2.5" fill="#a7f3d0"/>

  <!-- Headline -->
  <text x="150" y="272" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">Your Personal</text>
  <text x="150" y="296" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#059669" text-anchor="middle">Trainer</text>

  <!-- Subtext -->
  <text x="150" y="320" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">AI-powered workouts + nutrition plans</text>

  <!-- CTA button -->
  <rect x="65" y="340" width="170" height="40" rx="20" fill="#059669"/>
  <text x="150" y="365" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Get the App</text>

  <!-- Download badge -->
  <text x="150" y="393" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Free Download | iOS &amp; Android</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Native Content Ad — Taboola/Outbrain Style (300x300) -->
  <rect width="300" height="300" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Large image placeholder area -->
  <rect x="10" y="10" width="280" height="170" fill="#f3f4f6" rx="2"/>

  <!-- Placeholder content inside image area -->
  <g fill="#d1d5db">
    <!-- Mountain/landscape silhouette to suggest a photo -->
    <polygon points="60,140 100,90 130,120 160,80 200,110 240,75 270,140" fill="#e5e7eb"/>
    <polygon points="30,140 70,105 110,130 140,100 180,140" fill="#d1d5db" opacity="0.7"/>
    <!-- Sun -->
    <circle cx="230" cy="45" r="18" fill="#e5e7eb"/>
  </g>

  <!-- Sponsored Content label on image -->
  <rect x="10" y="10" width="130" height="22" fill="rgba(0,0,0,0.55)" rx="2"/>
  <text x="18" y="25" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#ffffff" font-weight="400">Sponsored Content</text>

  <!-- Clickbait headline -->
  <text x="14" y="205" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#111827" font-weight="700">
    <tspan x="14" dy="0">10 Things Doctors Don't</tspan>
    <tspan x="14" dy="19">Want You to Know About...</tspan>
  </text>

  <!-- Source and Sponsored label row -->
  <g transform="translate(14, 248)">
    <text x="0" y="0" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af">HealthDaily.com</text>
    <text x="110" y="0" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9ca3af">|</text>
    <text x="120" y="0" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9ca3af">Sponsored</text>
  </g>

  <!-- Separator line -->
  <line x1="14" y1="262" x2="286" y2="262" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Taboola-style footer -->
  <text x="150" y="280" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#d1d5db" text-anchor="middle">by Taboola</text>

  <!-- Small arrow icon suggesting clickable -->
  <polygon points="272,210 280,216 272,222" fill="#d1d5db"/>
</svg>

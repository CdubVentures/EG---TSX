<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" width="728" height="90">
  <defs>
    <linearGradient id="shieldGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="728" height="90" rx="4" fill="#0f172a"/>
  <rect x="0" y="0" width="728" height="90" rx="4" fill="url(#shieldGlow)"/>

  <!-- Brand area left: shield + lock + brand name -->
  <rect x="12" y="10" width="70" height="70" rx="12" fill="#1e293b"/>
  <path d="M47 18 L64 25 L64 44 Q64 56 47 64 Q30 56 30 44 L30 25 Z" fill="none" stroke="#0ea5e9" stroke-width="1.8"/>
  <path d="M47 22 L60 28 L60 43 Q60 53 47 60 Q34 53 34 43 L34 28 Z" fill="#0ea5e9" opacity="0.1"/>
  <!-- Lock icon inside shield -->
  <rect x="42" y="36" width="10" height="8" rx="2" fill="none" stroke="#0ea5e9" stroke-width="1.3"/>
  <path d="M44 36 L44 32 Q44 28 47 28 Q50 28 50 32 L50 36" fill="none" stroke="#0ea5e9" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="47" cy="40" r="1.2" fill="#0ea5e9"/>
  <text x="47" y="54" font-family="Arial, Helvetica, sans-serif" font-size="7" font-weight="700" fill="#38bdf8" text-anchor="middle" dominant-baseline="central" letter-spacing="1.5">SHIELD</text>
  <text x="47" y="62" font-family="Arial, Helvetica, sans-serif" font-size="6" font-weight="600" fill="#7dd3fc" text-anchor="middle" dominant-baseline="central" letter-spacing="2">VPN</text>

  <!-- Divider -->
  <line x1="96" y1="18" x2="96" y2="72" stroke="#1e293b" stroke-width="1"/>

  <!-- Headline center -->
  <text x="310" y="32" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#ffffff" text-anchor="middle" dominant-baseline="central">Browse Securely</text>
  <text x="470" y="32" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800" fill="#0ea5e9" text-anchor="middle" dominant-baseline="central">— 70% Off</text>
  <text x="340" y="58" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" dominant-baseline="central">Military-grade encryption. No logs. 90+ server locations worldwide.</text>

  <!-- CTA button right -->
  <rect x="572" y="22" width="132" height="46" rx="6" fill="url(#btnGrad)"/>
  <text x="638" y="46" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle" dominant-baseline="central">Start Trial</text>

  <!-- Ad label top-right -->
  <rect x="693" y="4" width="28" height="16" rx="3" fill="none" stroke="#334155" stroke-width="1"/>
  <text x="707" y="13" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#64748b" text-anchor="middle" dominant-baseline="central">Ad</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 250" width="970" height="250">
  <defs>
    <clipPath id="ad0-clip"><rect width="970" height="250" rx="4"/></clipPath>
  </defs>
  <g clip-path="url(#ad0-clip)">
    <!-- Background: clean white/light gray -->
    <rect width="970" height="250" fill="#f7f8fa"/>
    <!-- Subtle left accent stripe -->
    <rect x="0" y="0" width="5" height="250" fill="#1a56db"/>

    <!-- "Ad" badge top-right -->
    <rect x="920" y="8" width="36" height="18" rx="3" fill="#e5e7eb"/>
    <text x="938" y="20" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle" font-weight="600">Ad</text>

    <!-- Car silhouette placeholder -->
    <g transform="translate(60, 55)">
      <!-- Car body -->
      <rect x="0" y="60" width="160" height="50" rx="10" fill="#dbeafe"/>
      <rect x="20" y="35" width="110" height="40" rx="8" fill="#dbeafe"/>
      <!-- Windows -->
      <rect x="30" y="40" width="35" height="25" rx="4" fill="#93bbfd"/>
      <rect x="75" y="40" width="45" height="25" rx="4" fill="#93bbfd"/>
      <!-- Wheels -->
      <circle cx="40" cy="112" r="16" fill="#4b5563"/>
      <circle cx="40" cy="112" r="8" fill="#9ca3af"/>
      <circle cx="130" cy="112" r="16" fill="#4b5563"/>
      <circle cx="130" cy="112" r="8" fill="#9ca3af"/>
      <!-- Headlight -->
      <rect x="148" y="68" width="12" height="8" rx="2" fill="#fbbf24"/>
    </g>

    <!-- Brand logo area -->
    <g transform="translate(290, 30)">
      <!-- Shield icon -->
      <path d="M0 8 L16 0 L32 8 L32 22 Q32 34 16 40 Q0 34 0 22 Z" fill="#1a56db"/>
      <path d="M10 18 L15 24 L24 12" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Brand name -->
      <text x="42" y="16" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1a56db" font-weight="700">SafeGuard</text>
      <text x="42" y="34" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6b7280" font-weight="400">Insurance</text>
    </g>

    <!-- Headline -->
    <text x="290" y="105" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#111827" font-weight="700">Save up to 30%</text>
    <text x="290" y="142" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#374151" font-weight="400">on Auto Insurance</text>

    <!-- Subtext -->
    <text x="290" y="175" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#6b7280">Compare rates from top providers in minutes. No commitment required.</text>

    <!-- CTA Button -->
    <rect x="290" y="195" width="180" height="44" rx="6" fill="#1a56db"/>
    <text x="380" y="222" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="700">Get a Quote</text>

    <!-- Fine print -->
    <text x="485" y="222" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af">Free. No obligation.</text>

    <!-- Decorative dots pattern far right -->
    <g fill="#e5e7eb" opacity="0.6">
      <circle cx="850" cy="60" r="3"/><circle cx="870" cy="60" r="3"/><circle cx="890" cy="60" r="3"/>
      <circle cx="850" cy="80" r="3"/><circle cx="870" cy="80" r="3"/><circle cx="890" cy="80" r="3"/>
      <circle cx="850" cy="100" r="3"/><circle cx="870" cy="100" r="3"/><circle cx="890" cy="100" r="3"/>
      <circle cx="850" cy="120" r="3"/><circle cx="870" cy="120" r="3"/><circle cx="890" cy="120" r="3"/>
    </g>

    <!-- Border -->
    <rect width="970" height="250" rx="4" fill="none" stroke="#e5e7eb" stroke-width="1"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="970" height="250" viewBox="0 0 970 250">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cta-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="970" height="250" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="970" height="3" fill="url(#accent)"/>

  <!-- Geometric decoration — diagonal lines -->
  <line x1="620" y1="0" x2="720" y2="250" stroke="#1e2530" stroke-width="40"/>
  <line x1="680" y1="0" x2="780" y2="250" stroke="#1a2029" stroke-width="25"/>
  <line x1="730" y1="0" x2="830" y2="250" stroke="#161d25" stroke-width="15"/>

  <!-- Dot grid pattern (right side) -->
  <g fill="#2a3040" opacity="0.5">
    <circle cx="800" cy="60" r="2"/><circle cx="820" cy="60" r="2"/><circle cx="840" cy="60" r="2"/><circle cx="860" cy="60" r="2"/>
    <circle cx="800" cy="80" r="2"/><circle cx="820" cy="80" r="2"/><circle cx="840" cy="80" r="2"/><circle cx="860" cy="80" r="2"/>
    <circle cx="800" cy="100" r="2"/><circle cx="820" cy="100" r="2"/><circle cx="840" cy="100" r="2"/><circle cx="860" cy="100" r="2"/>
    <circle cx="800" cy="120" r="2"/><circle cx="820" cy="120" r="2"/><circle cx="840" cy="120" r="2"/><circle cx="860" cy="120" r="2"/>
  </g>

  <!-- Left content -->
  <text x="45" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#ffffff" letter-spacing="2">PRECISION</text>
  <text x="45" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="900" fill="#00d4ff" letter-spacing="2">REDEFINED</text>
  <text x="45" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#8b949e" letter-spacing="1">Ultra-Light Wireless Gaming Mouse</text>

  <!-- Spec pills -->
  <rect x="45" y="175" width="72" height="28" rx="14" fill="#1e2530"/>
  <text x="81" y="194" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#00d4ff" text-anchor="middle">49g</text>

  <rect x="127" y="175" width="90" height="28" rx="14" fill="#1e2530"/>
  <text x="172" y="194" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#00d4ff" text-anchor="middle">8000Hz</text>

  <rect x="227" y="175" width="100" height="28" rx="14" fill="#1e2530"/>
  <text x="277" y="194" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#00d4ff" text-anchor="middle">30K DPI</text>

  <!-- Center — mouse silhouette area -->
  <g transform="translate(480, 45)" opacity="0.12">
    <ellipse cx="60" cy="80" rx="50" ry="75" fill="#00d4ff"/>
    <rect x="20" y="10" width="80" height="50" rx="20" fill="#00d4ff"/>
  </g>

  <!-- Price badge -->
  <text x="780" y="85" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#8b949e" text-anchor="middle">Starting at</text>
  <text x="780" y="125" font-family="system-ui, sans-serif" font-size="38" font-weight="900" fill="#ffffff" text-anchor="middle">$149</text>

  <!-- CTA Button -->
  <rect x="718" y="155" width="130" height="44" rx="22" fill="url(#cta-bg)"/>
  <text x="783" y="183" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#0d1117" text-anchor="middle" letter-spacing="1">SHOP NOW</text>

  <!-- Brand area -->
  <rect x="890" y="210" width="55" height="20" rx="3" fill="none" stroke="#2a3040" stroke-width="1"/>
  <text x="917" y="224" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#4a5568" text-anchor="middle">BRAND</text>

  <!-- Bottom accent bar -->
  <rect y="247" width="970" height="3" fill="url(#accent)"/>

  <!-- Sponsored label -->
  <text x="940" y="18" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#4a5568" text-anchor="end">Sponsored</text>
</svg>

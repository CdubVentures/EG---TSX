<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
  <!-- CookMaster — Kitchen/Cookware Ad (300x450) -->
  <rect width="300" height="450" fill="#fffbeb" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Sponsored</text>

  <!-- Brand -->
  <text x="20" y="38" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#dc2626">CookMaster</text>
  <text x="180" y="38" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9ca3af">Est. 1987</text>

  <!-- Pan silhouette area -->
  <rect x="25" y="55" width="250" height="185" rx="8" fill="#fef3c7"/>
  <!-- Pan body (top-down view) -->
  <circle cx="140" cy="150" r="60" fill="#d6d3d1"/>
  <circle cx="140" cy="150" r="52" fill="#a8a29e"/>
  <circle cx="140" cy="150" r="45" fill="#78716c" opacity="0.3"/>
  <!-- Pan inner cooking surface -->
  <circle cx="140" cy="150" r="40" fill="#292524" opacity="0.15"/>
  <!-- Handle -->
  <rect x="195" y="140" width="70" height="16" rx="4" fill="#78716c"/>
  <rect x="195" y="143" width="60" height="10" rx="3" fill="#a8a29e"/>
  <!-- Rivets -->
  <circle cx="200" cy="148" r="3" fill="#d6d3d1"/>
  <!-- Steam wisps -->
  <path d="M 120,98 Q 118,88 122,80" fill="none" stroke="#d6d3d1" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 135,92 Q 133,82 137,74" fill="none" stroke="#d6d3d1" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 150,96 Q 148,86 152,78" fill="none" stroke="#d6d3d1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small utensils accent -->
  <line x1="55" y1="85" x2="55" y2="120" stroke="#a8a29e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="55" cy="83" r="5" fill="none" stroke="#a8a29e" stroke-width="1.5"/>
  <line x1="70" y1="82" x2="70" y2="120" stroke="#a8a29e" stroke-width="2" stroke-linecap="round"/>
  <rect x="67" y="78" width="6" height="8" rx="1" fill="none" stroke="#a8a29e" stroke-width="1.5"/>

  <!-- Headline -->
  <text x="150" y="272" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#292524" text-anchor="middle">Pro Chef Cookware</text>

  <!-- Offer badge -->
  <rect x="95" y="285" width="110" height="28" rx="14" fill="#dc2626"/>
  <text x="150" y="304" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">40% Off</text>

  <!-- Features -->
  <text x="150" y="336" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#78716c" text-anchor="middle">Tri-ply stainless steel construction</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="11">
    <rect x="25" y="350" width="76" height="36" rx="4" fill="#fef9c3"/>
    <text x="63" y="365" fill="#92400e" font-weight="600" text-anchor="middle">Oven Safe</text>
    <text x="63" y="378" fill="#a16207" font-size="9" text-anchor="middle">to 500°F</text>

    <rect x="112" y="350" width="76" height="36" rx="4" fill="#fef9c3"/>
    <text x="150" y="365" fill="#92400e" font-weight="600" text-anchor="middle">Lifetime</text>
    <text x="150" y="378" fill="#a16207" font-size="9" text-anchor="middle">Warranty</text>

    <rect x="199" y="350" width="76" height="36" rx="4" fill="#fef9c3"/>
    <text x="237" y="365" fill="#92400e" font-weight="600" text-anchor="middle">PFOA</text>
    <text x="237" y="378" fill="#a16207" font-size="9" text-anchor="middle">Free</text>
  </g>

  <!-- CTA button -->
  <rect x="55" y="400" width="190" height="40" rx="6" fill="#dc2626"/>
  <text x="150" y="425" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Shop Sale</text>

  <!-- Footer -->
  <text x="150" y="448" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#a8a29e" text-anchor="middle">cookmaster.com | Free shipping on $75+</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <!-- CloudDesk — SaaS/Productivity Ad (300x600) -->
  <rect width="300" height="600" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Sponsored</text>

  <!-- Brand -->
  <circle cx="32" cy="40" r="12" fill="#7c3aed"/>
  <text x="32" y="44" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
  <text x="52" y="45" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1f2937">CloudDesk</text>

  <!-- Laptop silhouette placeholder -->
  <rect x="30" y="75" width="240" height="195" rx="4" fill="#f5f3ff"/>
  <!-- Screen -->
  <rect x="55" y="90" width="190" height="120" rx="6" fill="#ede9fe"/>
  <!-- Screen content lines -->
  <rect x="70" y="108" width="80" height="6" rx="3" fill="#c4b5fd"/>
  <rect x="70" y="122" width="60" height="6" rx="3" fill="#ddd6fe"/>
  <rect x="70" y="136" width="100" height="6" rx="3" fill="#ddd6fe"/>
  <rect x="70" y="156" width="50" height="22" rx="4" fill="#7c3aed"/>
  <text x="95" y="171" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#ffffff" text-anchor="middle">Save</text>
  <!-- Chart bars -->
  <rect x="170" y="155" width="10" height="40" rx="2" fill="#c4b5fd"/>
  <rect x="185" y="140" width="10" height="55" rx="2" fill="#a78bfa"/>
  <rect x="200" y="125" width="10" height="70" rx="2" fill="#7c3aed"/>
  <!-- Keyboard base -->
  <rect x="40" y="215" width="220" height="10" rx="3" fill="#e5e7eb"/>
  <rect x="90" y="225" width="120" height="5" rx="2" fill="#d1d5db"/>

  <!-- Headline -->
  <text x="150" y="310" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="middle">Work Smarter,</text>
  <text x="150" y="336" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#7c3aed" text-anchor="middle">Not Harder</text>

  <!-- Subtext -->
  <text x="150" y="362" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">The all-in-one workspace for teams</text>

  <!-- Feature checkmarks -->
  <rect x="30" y="385" width="240" height="110" rx="8" fill="#f9fafb"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="50" y="413" font-size="16" fill="#7c3aed">&#10003;</text>
    <text x="72" y="414" font-size="14" font-weight="500" fill="#374151">Real-time Sync</text>

    <text x="50" y="443" font-size="16" fill="#7c3aed">&#10003;</text>
    <text x="72" y="444" font-size="14" font-weight="500" fill="#374151">1-Click Share</text>

    <text x="50" y="473" font-size="16" fill="#7c3aed">&#10003;</text>
    <text x="72" y="474" font-size="14" font-weight="500" fill="#374151">Team Collaboration</text>
  </g>

  <!-- Trust badge -->
  <text x="150" y="520" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle">Trusted by 50,000+ teams worldwide</text>

  <!-- CTA button -->
  <rect x="55" y="538" width="190" height="44" rx="22" fill="#7c3aed"/>
  <text x="150" y="565" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Try Free</text>

  <!-- Footer -->
  <text x="150" y="596" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">No credit card required</text>
</svg>
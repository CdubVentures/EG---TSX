<svg xmlns="http://www.w3.org/2000/svg" width="336" height="280" viewBox="0 0 336 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#12161f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cta-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="336" height="280" fill="url(#bg)"/>
  <rect width="336" height="2" fill="url(#accent)"/>

  <!-- Geometric accents -->
  <polygon points="336,0 336,120 256,0" fill="#1a1f2e" opacity="0.5"/>
  <polygon points="336,0 336,70 286,0" fill="#1e2435" opacity="0.4"/>

  <!-- "NEW" badge -->
  <rect x="24" y="22" width="56" height="24" rx="4" fill="#ef4444"/>
  <text x="52" y="39" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="1">NEW</text>

  <!-- Product name -->
  <text x="24" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#ffffff" letter-spacing="1">MECHANICAL</text>
  <text x="24" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="900" fill="#f97316" letter-spacing="1">PRECISION</text>
  <text x="24" y="135" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#8b949e">Pro Gaming Keyboard</text>

  <!-- Product silhouette -->
  <g transform="translate(60, 148)" opacity="0.08">
    <rect x="0" y="0" width="220" height="60" rx="6" fill="#f97316"/>
    <rect x="5" y="5" width="14" height="14" rx="2" fill="#f97316"/>
    <rect x="22" y="5" width="14" height="14" rx="2" fill="#f97316"/>
    <rect x="39" y="5" width="14" height="14" rx="2" fill="#f97316"/>
    <rect x="56" y="5" width="14" height="14" rx="2" fill="#f97316"/>
  </g>

  <!-- Rating stars -->
  <g transform="translate(24, 162)">
    <text font-family="system-ui, sans-serif" font-size="14" fill="#f97316">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
    <text x="82" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#8b949e" dy="1">4.8</text>
  </g>

  <!-- Spec pills -->
  <rect x="24" y="186" width="80" height="24" rx="12" fill="#1e2530"/>
  <text x="64" y="202" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f97316" text-anchor="middle">Hot-Swap</text>

  <rect x="112" y="186" width="70" height="24" rx="12" fill="#1e2530"/>
  <text x="147" y="202" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f97316" text-anchor="middle">RGB</text>

  <rect x="190" y="186" width="90" height="24" rx="12" fill="#1e2530"/>
  <text x="235" y="202" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#f97316" text-anchor="middle">Gasket</text>

  <!-- Price + CTA -->
  <text x="24" y="240" font-family="system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffffff">$189</text>
  <rect x="200" y="220" width="112" height="38" rx="19" fill="url(#cta-bg)"/>
  <text x="256" y="244" font-family="system-ui, sans-serif" font-size="13" font-weight="800" fill="#0d1117" text-anchor="middle" letter-spacing="1">BUY NOW</text>

  <!-- Sponsored -->
  <text x="312" y="272" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#4a5568" text-anchor="end">Sponsored</text>

  <!-- Bottom accent -->
  <rect y="278" width="336" height="2" fill="url(#accent)"/>
</svg>

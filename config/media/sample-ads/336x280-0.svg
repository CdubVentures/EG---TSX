<svg xmlns="http://www.w3.org/2000/svg" width="336" height="280" viewBox="0 0 336 280">
  <!-- TravelEase — Travel Booking Ad (336x280) -->
  <rect width="336" height="280" fill="#ffffff" rx="2" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Sky-blue photo area -->
  <rect x="1" y="1" width="334" height="120" fill="#e0f2fe" rx="2"/>

  <!-- Cloud silhouettes -->
  <ellipse cx="80" cy="55" rx="40" ry="16" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="60" cy="55" rx="25" ry="12" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="100" cy="58" rx="20" ry="10" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="240" cy="40" rx="30" ry="12" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="260" cy="42" rx="18" ry="9" fill="#ffffff" opacity="0.5"/>

  <!-- Airplane silhouette -->
  <g transform="translate(168, 75) rotate(-15)" fill="#1e3a5f" opacity="0.6">
    <ellipse cx="0" cy="0" rx="28" ry="5"/>
    <polygon points="-8,-5 -20,-18 -5,-5"/>
    <polygon points="-8,5 -20,18 -5,5"/>
    <polygon points="20,-2 28,-10 25,-2"/>
    <polygon points="20,2 28,10 25,2"/>
  </g>

  <!-- Ad label -->
  <text x="318" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="168" y="148" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle" font-weight="600" letter-spacing="1.5">TRAVELEASE</text>

  <!-- Headline -->
  <text x="168" y="172" font-family="Georgia, Times New Roman, serif" font-size="18" fill="#1e3a5f" text-anchor="middle" font-weight="700">Flights from $89</text>
  <text x="168" y="192" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4b5563" text-anchor="middle">Compare 500+ airlines. Best price guaranteed.</text>

  <!-- 5-star rating -->
  <g transform="translate(105, 210)">
    <polygon points="6,0 7.8,4.5 12,4.5 8.7,7.2 9.7,12 6,9.3 2.3,12 3.3,7.2 0,4.5 4.2,4.5" fill="#f59e0b"/>
    <polygon points="22,0 23.8,4.5 28,4.5 24.7,7.2 25.7,12 22,9.3 18.3,12 19.3,7.2 16,4.5 20.2,4.5" fill="#f59e0b"/>
    <polygon points="38,0 39.8,4.5 44,4.5 40.7,7.2 41.7,12 38,9.3 34.3,12 35.3,7.2 32,4.5 36.2,4.5" fill="#f59e0b"/>
    <polygon points="54,0 55.8,4.5 60,4.5 56.7,7.2 57.7,12 54,9.3 50.3,12 51.3,7.2 48,4.5 52.2,4.5" fill="#f59e0b"/>
    <polygon points="70,0 71.8,4.5 76,4.5 72.7,7.2 73.7,12 70,9.3 66.3,12 67.3,7.2 64,4.5 68.2,4.5" fill="#f59e0b"/>
    <text x="84" y="11" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9ca3af">4.8 (12k reviews)</text>
  </g>

  <!-- CTA Button -->
  <rect x="98" y="232" width="140" height="36" rx="6" fill="#2563eb"/>
  <text x="168" y="255" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="600">Search Flights</text>
</svg>

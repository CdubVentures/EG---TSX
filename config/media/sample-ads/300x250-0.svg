<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <!-- Background with subtle border -->
  <rect x="0.5" y="0.5" width="299" height="249" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- "Ad" label top-right -->
  <text x="286" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand mark: blue dot + brand name -->
  <circle cx="20" cy="18" r="5" fill="#1a56db"/>
  <text x="30" y="22" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#1a56db">SafeGuard</text>
  <text x="90" y="22" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#6b7280">Insurance</text>

  <!-- Car outline -->
  <g transform="translate(110, 40)" fill="none" stroke="#1a56db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5,38 L5,30 Q5,26 9,26 L20,26 L28,14 Q30,10 34,10 L52,10 Q56,10 58,14 L66,26 L75,26 Q79,26 79,30 L79,38" fill="#eef2ff"/>
    <circle cx="24" cy="40" r="6" fill="#ffffff" stroke="#1a56db" stroke-width="1.5"/>
    <circle cx="24" cy="40" r="2.5" fill="#1a56db"/>
    <circle cx="62" cy="40" r="6" fill="#ffffff" stroke="#1a56db" stroke-width="1.5"/>
    <circle cx="62" cy="40" r="2.5" fill="#1a56db"/>
    <path d="M32,26 L36,14 Q37,12 39,12 L51,12 Q53,12 54,14 L58,26" fill="#dbeafe" stroke="#1a56db" stroke-width="1"/>
    <line x1="46" y1="12" x2="46" y2="26" stroke="#1a56db" stroke-width="1"/>
    <line x1="2" y1="46" x2="82" y2="46" stroke="#d1d5db" stroke-width="0.75"/>
  </g>

  <!-- Headline -->
  <text x="150" y="120" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">Auto Insurance</text>
  <text x="150" y="146" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">from $29/mo</text>

  <!-- Subtext -->
  <text x="150" y="170" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Compare rates in minutes. No obligations.</text>

  <!-- CTA Button -->
  <rect x="100" y="186" width="100" height="34" rx="6" fill="#1a56db"/>
  <text x="150" y="208" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Get Quote</text>

  <!-- Fine print -->
  <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">Sponsored by SafeGuard Insurance Co.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="336" height="280" viewBox="0 0 336 280">
  <!-- PetPal — Pet Supplies Ad (336x280) -->
  <rect width="336" height="280" fill="#f0fdf4" rx="2" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Dog silhouette (right side) -->
  <g transform="translate(260, 50)" fill="#059669" opacity="0.12">
    <path d="M0,80 C0,60 8,40 20,30 C25,26 28,18 26,10 C25,5 30,0 35,2 C40,4 38,12 36,16 C34,22 38,28 44,30 C50,32 54,28 56,22 C57,16 62,14 65,18 C67,22 64,28 60,34 C52,46 50,60 52,80 Z"/>
    <ellipse cx="26" cy="80" rx="30" ry="6"/>
  </g>

  <!-- Paw print icon -->
  <g transform="translate(20, 18)" fill="#059669" opacity="0.25">
    <ellipse cx="12" cy="6" rx="5" ry="6"/>
    <ellipse cx="26" cy="4" rx="4" ry="5"/>
    <ellipse cx="0" cy="10" rx="4" ry="5"/>
    <ellipse cx="13" cy="20" rx="9" ry="8"/>
  </g>

  <!-- Ad label -->
  <text x="318" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="168" y="55" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="700" letter-spacing="2">PETPAL</text>

  <!-- Headline -->
  <text x="168" y="90" font-family="Georgia, Times New Roman, serif" font-size="19" fill="#1a2e1a" text-anchor="middle" font-weight="700">Premium Pet Food</text>

  <!-- Discount badge -->
  <rect x="108" y="102" width="120" height="28" rx="14" fill="#059669"/>
  <text x="168" y="121" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="700">30% Off First Box</text>

  <!-- Body text -->
  <text x="168" y="155" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">Vet-approved, grain-free recipes</text>
  <text x="168" y="172" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4b5563" text-anchor="middle">delivered to your door monthly.</text>

  <!-- Trust badges -->
  <g transform="translate(68, 184)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
    <text x="30" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">Organic</text>

    <rect x="68" y="0" width="68" height="20" rx="10" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
    <text x="102" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">Grain-Free</text>

    <rect x="144" y="0" width="60" height="20" rx="10" fill="#dcfce7" stroke="#bbf7d0" stroke-width="1"/>
    <text x="174" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">Non-GMO</text>
  </g>

  <!-- CTA Button -->
  <rect x="98" y="218" width="140" height="38" rx="6" fill="#059669"/>
  <text x="168" y="242" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="600">Claim Offer</text>

  <!-- Fine print -->
  <text x="168" y="270" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Free shipping on orders $35+</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <!-- NordStyle — Furniture Ad (300x400) -->
  <rect width="300" height="400" fill="#faf5f0" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="20" y="36" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#78350f" letter-spacing="2">NORDSTYLE</text>

  <!-- Chair silhouette area -->
  <rect x="30" y="55" width="240" height="170" rx="6" fill="#f5ebe0"/>
  <!-- Chair back -->
  <rect x="115" y="70" width="70" height="90" rx="12" fill="#d6ccc2"/>
  <!-- Chair seat -->
  <rect x="105" y="150" width="90" height="20" rx="6" fill="#c8b6a6"/>
  <!-- Chair legs -->
  <line x1="115" y1="170" x2="108" y2="210" stroke="#a08a76" stroke-width="3" stroke-linecap="round"/>
  <line x1="185" y1="170" x2="192" y2="210" stroke="#a08a76" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="170" x2="140" y2="208" stroke="#a08a76" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="170" x2="160" y2="208" stroke="#a08a76" stroke-width="3" stroke-linecap="round"/>
  <!-- Small side table hint -->
  <rect x="210" y="155" width="40" height="4" rx="2" fill="#c8b6a6"/>
  <line x1="215" y1="159" x2="215" y2="210" stroke="#a08a76" stroke-width="2" stroke-linecap="round"/>
  <line x1="245" y1="159" x2="245" y2="210" stroke="#a08a76" stroke-width="2" stroke-linecap="round"/>
  <!-- Plant accent -->
  <circle cx="228" cy="148" r="10" fill="#a3b18a" opacity="0.6"/>
  <circle cx="234" cy="142" r="8" fill="#a3b18a" opacity="0.4"/>
  <rect x="226" y="148" width="4" height="10" fill="#a08a76"/>

  <!-- Headline -->
  <text x="150" y="258" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#292524" text-anchor="middle">Modern Living</text>

  <!-- Offer badge -->
  <rect x="90" y="270" width="120" height="26" rx="13" fill="#b45309"/>
  <text x="150" y="288" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">25% Off Everything</text>

  <!-- Features -->
  <text x="150" y="318" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#78716c" text-anchor="middle">Handcrafted designs. Sustainable materials.</text>
  <text x="150" y="335" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#78716c" text-anchor="middle">Free delivery on orders $500+</text>

  <!-- CTA button -->
  <rect x="60" y="350" width="180" height="40" rx="4" fill="#b45309"/>
  <text x="150" y="375" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Shop Collection</text>

  <!-- Footer -->
  <text x="150" y="398" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#a8a29e" text-anchor="middle">nordstyle.com | Use code MODERN25</text>
</svg>
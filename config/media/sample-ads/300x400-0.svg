<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <!-- DreamRest — Mattress Ad (300x400) -->
  <rect width="300" height="400" fill="#f0f4ff" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="20" y="36" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#4f46e5">DreamRest</text>
  <text x="175" y="36" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#6b7280">&#174;</text>

  <!-- Bed shape placeholder -->
  <rect x="25" y="58" width="250" height="140" rx="8" fill="#e0e7ff"/>
  <!-- Mattress shape -->
  <rect x="50" y="105" width="200" height="45" rx="8" fill="#c7d2fe"/>
  <rect x="50" y="100" width="200" height="15" rx="6" fill="#a5b4fc"/>
  <!-- Pillow shapes -->
  <ellipse cx="100" cy="95" rx="35" ry="12" fill="#c7d2fe"/>
  <ellipse cx="185" cy="95" rx="35" ry="12" fill="#c7d2fe"/>
  <!-- Headboard -->
  <rect x="45" y="70" width="210" height="30" rx="10" fill="#818cf8" opacity="0.3"/>
  <!-- Bed legs -->
  <rect x="65" y="150" width="8" height="18" rx="2" fill="#a5b4fc"/>
  <rect x="227" y="150" width="8" height="18" rx="2" fill="#a5b4fc"/>
  <!-- Zzz -->
  <text x="230" y="82" font-family="Georgia, serif" font-size="16" fill="#818cf8" opacity="0.6">z</text>
  <text x="242" y="72" font-family="Georgia, serif" font-size="12" fill="#818cf8" opacity="0.4">z</text>
  <text x="250" y="65" font-family="Georgia, serif" font-size="9" fill="#818cf8" opacity="0.3">z</text>

  <!-- Headline -->
  <text x="150" y="230" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1e1b4b" text-anchor="middle">Sleep Better Tonight</text>

  <!-- Offer -->
  <rect x="100" y="242" width="100" height="24" rx="12" fill="#4f46e5"/>
  <text x="150" y="259" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">$200 Off</text>

  <!-- Features -->
  <text x="150" y="292" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6b7280" text-anchor="middle">Cooling gel memory foam + 365-night trial</text>

  <!-- Star rating -->
  <text x="78" y="320" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#f59e0b">&#9733;&#9733;&#9733;&#9733;&#9733;</text>
  <text x="155" y="320" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" fill="#4b5563">12,400 Reviews</text>

  <!-- CTA button -->
  <rect x="60" y="340" width="180" height="40" rx="20" fill="#4f46e5"/>
  <text x="150" y="365" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Shop Now</text>

  <!-- Footer -->
  <text x="150" y="394" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="middle">Free shipping + returns | dreamrest.com</text>
</svg>
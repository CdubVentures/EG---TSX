<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#131a24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="400" fill="url(#bg)"/>
  <rect width="300" height="3" fill="url(#accent)"/>

  <!-- Geometric decorations -->
  <line x1="0" y1="160" x2="300" y2="140" stroke="#1a2332" stroke-width="1"/>
  <line x1="0" y1="260" x2="300" y2="280" stroke="#1a2332" stroke-width="1"/>
  <circle cx="150" cy="180" r="70" fill="url(#glow)"/>

  <!-- Brand -->
  <rect x="20" y="22" width="8" height="8" rx="4" fill="#00d4ff"/>
  <text x="36" y="31" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8b949e" letter-spacing="2">SAMPLE BRAND</text>

  <!-- Headline -->
  <text x="20" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="1">WIRELESS</text>
  <text x="20" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#00d4ff" letter-spacing="1">FREEDOM</text>

  <!-- Battery icon area -->
  <rect x="80" y="140" width="140" height="70" rx="8" fill="none" stroke="#1e2a38" stroke-width="1.5"/>
  <rect x="220" y="158" width="8" height="34" rx="3" fill="none" stroke="#1e2a38" stroke-width="1.5"/>
  <rect x="88" y="148" width="100" height="54" rx="4" fill="#00d4ff" opacity="0.08"/>

  <text x="150" y="175" font-family="system-ui, sans-serif" font-size="18" font-weight="900" fill="#00d4ff" text-anchor="middle">100+ HRS</text>
  <text x="150" y="195" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="#6b7280" text-anchor="middle">Battery Life</text>

  <!-- Tagline -->
  <text x="150" y="245" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Zero lag. Zero limits.</text>
  <text x="150" y="265" font-family="system-ui, sans-serif" font-size="14" font-weight="500" fill="#8b949e" text-anchor="middle">Pure wireless performance.</text>

  <!-- Spec pills -->
  <rect x="20" y="288" width="78" height="24" rx="12" fill="#1e2530"/>
  <text x="59" y="304" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#00d4ff" text-anchor="middle">49g</text>

  <rect x="106" y="288" width="90" height="24" rx="12" fill="#1e2530"/>
  <text x="151" y="304" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#00d4ff" text-anchor="middle">8000Hz</text>

  <rect x="204" y="288" width="78" height="24" rx="12" fill="#1e2530"/>
  <text x="243" y="304" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#00d4ff" text-anchor="middle">BT 5.3</text>

  <!-- Price + CTA -->
  <text x="20" y="350" font-family="system-ui, sans-serif" font-size="26" font-weight="900" fill="#ffffff">$159</text>
  <rect x="170" y="330" width="110" height="38" rx="19" fill="#00d4ff"/>
  <text x="225" y="355" font-family="system-ui, sans-serif" font-size="13" font-weight="800" fill="#0d1117" text-anchor="middle" letter-spacing="1">SHOP NOW</text>

  <!-- Sponsored -->
  <text x="280" y="392" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#4a5568" text-anchor="end">Sponsored</text>

  <!-- Bottom accent -->
  <rect y="397" width="300" height="3" fill="url(#accent)"/>
</svg>

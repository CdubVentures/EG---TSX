<svg xmlns="http://www.w3.org/2000/svg" width="300" height="600" viewBox="0 0 300 600">
  <!-- StreamMax — Streaming Service Ad (300x600) -->
  <rect width="300" height="600" fill="#141414"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555" text-anchor="end">Ad</text>

  <!-- Brand -->
  <text x="150" y="40" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">StreamMax</text>
  <rect x="115" y="48" width="70" height="2" rx="1" fill="#e11d48"/>

  <!-- Fake movie poster area -->
  <rect x="20" y="68" width="260" height="310" rx="6" fill="#1c1c1c"/>
  <defs>
    <linearGradient id="posterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="40%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect x="20" y="68" width="260" height="230" rx="6" fill="url(#posterGrad)"/>
  <!-- Poster accent lines (fake cinematic composition) -->
  <rect x="40" y="90" width="80" height="4" rx="2" fill="#333"/>
  <rect x="40" y="100" width="55" height="3" rx="1.5" fill="#2a2a2a"/>
  <!-- Dark silhouette figure hint -->
  <ellipse cx="200" cy="210" rx="40" ry="70" fill="#222" opacity="0.6"/>
  <rect x="170" y="140" width="60" height="80" rx="4" fill="#252525" opacity="0.5"/>

  <!-- Play button overlay -->
  <circle cx="150" cy="200" r="30" fill="rgba(225,29,72,0.85)"/>
  <polygon points="142,184 142,216 168,200" fill="#ffffff"/>

  <!-- Poster bottom info -->
  <rect x="30" y="300" width="140" height="10" rx="2" fill="#3a3a3a"/>
  <rect x="30" y="316" width="95" height="8" rx="2" fill="#2e2e2e"/>
  <text x="30" y="348" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#777">Drama / Sci-Fi / 2026</text>
  <text x="30" y="365" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#777">Rated TV-MA</text>

  <!-- Star rating -->
  <text x="30" y="410" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#fbbf24">&#9733;&#9733;&#9733;&#9733;&#9734;</text>
  <text x="118" y="410" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#999">4.3 / 5</text>
  <text x="195" y="410" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#666">28K ratings</text>

  <!-- Divider -->
  <rect x="30" y="425" width="240" height="1" fill="#2a2a2a"/>

  <!-- Headline -->
  <text x="150" y="462" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Watch Unlimited</text>
  <text x="150" y="486" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#ccc" text-anchor="middle">Free for 30 Days</text>

  <!-- Subtext -->
  <text x="150" y="512" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#888" text-anchor="middle">No commitments. Cancel anytime.</text>

  <!-- CTA button -->
  <rect x="55" y="530" width="190" height="44" rx="22" fill="#e11d48"/>
  <text x="150" y="557" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Start Watching</text>

  <!-- Footer -->
  <text x="150" y="590" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#555" text-anchor="middle">streammax.com | Terms apply</text>
</svg>
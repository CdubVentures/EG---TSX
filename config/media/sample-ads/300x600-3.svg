<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
  <!-- Video Ad Simulation — Mediavine/Ezoic style sidebar video unit -->

  <!-- Player background -->
  <rect width="300" height="600" fill="#000000"/>

  <!-- Video thumbnail area (top 340px) -->
  <defs>
    <linearGradient id="vidThumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="playGlow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect y="0" width="300" height="340" fill="url(#vidThumb)"/>

  <!-- Fake video content: product shot silhouette (laptop) -->
  <g transform="translate(60, 80)" opacity="0.25">
    <rect x="0" y="0" width="180" height="110" rx="4" fill="#ffffff"/>
    <rect x="8" y="6" width="164" height="90" rx="2" fill="#3b82f6"/>
    <rect x="30" y="110" width="120" height="8" rx="2" fill="#ffffff"/>
    <rect x="50" y="118" width="80" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Play button overlay -->
  <circle cx="150" cy="160" r="32" fill="#000000" opacity="0.6"/>
  <circle cx="150" cy="160" r="30" fill="url(#playGlow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
  <polygon points="142,145 142,175 168,160" fill="#ffffff"/>

  <!-- "Ad" badge top-left -->
  <rect x="8" y="8" width="28" height="18" rx="3" fill="#000000" opacity="0.7"/>
  <text x="22" y="20" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" text-anchor="middle">AD</text>

  <!-- Duration badge top-right -->
  <rect x="252" y="8" width="40" height="18" rx="3" fill="#000000" opacity="0.7"/>
  <text x="272" y="20" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="600" fill="#ffffff" text-anchor="middle">0:30</text>

  <!-- Video progress bar -->
  <rect x="0" y="330" width="300" height="4" fill="#374151"/>
  <rect x="0" y="330" width="105" height="4" fill="#ef4444" rx="0"/>
  <circle cx="105" cy="332" r="5" fill="#ef4444"/>

  <!-- Video controls bar -->
  <rect x="0" y="334" width="300" height="36" fill="#111111"/>

  <!-- Play/pause icon -->
  <rect x="14" y="346" width="3" height="12" rx="1" fill="#ffffff"/>
  <rect x="21" y="346" width="3" height="12" rx="1" fill="#ffffff"/>

  <!-- Time display -->
  <text x="38" y="356" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#9ca3af">0:11 / 0:30</text>

  <!-- Volume icon -->
  <g transform="translate(225, 346)">
    <rect x="0" y="3" width="4" height="6" fill="#ffffff"/>
    <polygon points="4,1 10,0 10,12 4,11" fill="#ffffff"/>
    <path d="M14,3 Q18,6 14,9" fill="none" stroke="#ffffff" stroke-width="1.2"/>
    <path d="M16,1 Q22,6 16,11" fill="none" stroke="#ffffff" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Fullscreen icon -->
  <g transform="translate(270, 346)" fill="none" stroke="#ffffff" stroke-width="1.5">
    <polyline points="0,4 0,0 4,0"/>
    <polyline points="8,0 12,0 12,4"/>
    <polyline points="12,8 12,12 8,12"/>
    <polyline points="4,12 0,12 0,8"/>
  </g>

  <!-- Skip button -->
  <rect x="198" y="300" width="90" height="26" rx="4" fill="#000000" opacity="0.75"/>
  <text x="243" y="316" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle">Skip Ad ▸</text>

  <!-- Below-video content: advertiser info -->
  <rect x="0" y="370" width="300" height="230" fill="#ffffff"/>

  <!-- Brand + headline -->
  <circle cx="24" cy="392" r="10" fill="#2563eb"/>
  <text x="22" y="396" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="800" fill="#ffffff" text-anchor="middle">T</text>
  <text x="42" y="389" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#111827">TechGear Pro</text>
  <text x="42" y="401" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#6b7280">Sponsored</text>

  <text x="16" y="432" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#111827">The All-New ProBook</text>
  <text x="16" y="452" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#111827">Ultra — Now Available</text>

  <text x="16" y="476" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">M4 Pro chip. 24hr battery. 14" Liquid Retina.</text>
  <text x="16" y="492" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#6b7280">Starting at $1,599.</text>

  <!-- CTA -->
  <rect x="16" y="510" width="268" height="40" rx="6" fill="#2563eb"/>
  <text x="150" y="535" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Shop Now →</text>

  <!-- Powered by label -->
  <text x="150" y="575" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#9ca3af" text-anchor="middle">Video ad served by Mediavine</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <!-- Background (dark navy, no border needed) -->
  <rect width="300" height="250" fill="#0f172a"/>

  <!-- "Ad" label top-right -->
  <text x="286" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#475569" text-anchor="end">Ad</text>

  <!-- Brand mark: teal dot + brand name -->
  <circle cx="20" cy="18" r="5" fill="#0ea5e9"/>
  <text x="30" y="22" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#0ea5e9">ShieldVPN</text>

  <!-- Shield icon with checkmark -->
  <g transform="translate(118, 36)">
    <!-- Shield outline -->
    <path d="M32,2 L58,14 Q60,15 60,17 L60,34 Q60,52 32,62 Q4,52 4,34 L4,17 Q4,15 6,14 Z"
          fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.8"/>
    <!-- Inner shield -->
    <path d="M32,8 L52,17 Q54,18 54,20 L54,34 Q54,48 32,56 Q10,48 10,34 L10,20 Q10,18 12,17 Z"
          fill="#0ea5e9" opacity="0.08"/>
    <!-- Checkmark -->
    <path d="M20,32 L28,40 L46,20" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Headline -->
  <text x="150" y="122" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#f1f5f9" text-anchor="middle">Protect Your Privacy</text>

  <!-- Price callout -->
  <text x="150" y="150" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#0ea5e9" text-anchor="middle">70% Off</text>

  <!-- Subtext -->
  <text x="150" y="172" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Military-grade encryption. 90+ countries.</text>

  <!-- CTA Button -->
  <rect x="82" y="186" width="136" height="36" rx="6" fill="#0ea5e9"/>
  <text x="150" y="209" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Start Free Trial</text>

  <!-- Fine print -->
  <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#475569" text-anchor="middle">Cancel anytime. No credit card required.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450" viewBox="0 0 300 450">
  <!-- AutoMax — Car Dealership Ad (300x450) -->
  <rect width="300" height="450" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Ad label -->
  <text x="280" y="16" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#9ca3af" text-anchor="end">Sponsored</text>

  <!-- Brand -->
  <rect x="18" y="18" width="28" height="28" rx="6" fill="#2563eb"/>
  <text x="32" y="38" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800" fill="#ffffff" text-anchor="middle">A</text>
  <text x="54" y="38" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1e293b">AutoMax</text>

  <!-- 0% APR badge -->
  <rect x="200" y="22" width="80" height="24" rx="12" fill="#dbeafe"/>
  <text x="240" y="39" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">0% APR</text>

  <!-- Car front silhouette area -->
  <rect x="20" y="60" width="260" height="175" rx="6" fill="#eff6ff"/>
  <!-- Car body -->
  <rect x="55" y="140" width="190" height="55" rx="12" fill="#bfdbfe"/>
  <!-- Car roof/windshield -->
  <path d="M 100,140 L 120,100 L 200,100 L 210,140 Z" fill="#93c5fd"/>
  <!-- Windshield -->
  <path d="M 125,135 L 135,108 L 190,108 L 200,135 Z" fill="#dbeafe"/>
  <!-- Headlights -->
  <rect x="60" y="155" width="30" height="12" rx="6" fill="#93c5fd"/>
  <rect x="210" y="155" width="30" height="12" rx="6" fill="#93c5fd"/>
  <!-- Grille -->
  <rect x="110" y="165" width="80" height="14" rx="4" fill="#93c5fd"/>
  <line x1="120" y1="168" x2="120" y2="176" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="135" y1="168" x2="135" y2="176" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="150" y1="168" x2="150" y2="176" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="165" y1="168" x2="165" y2="176" stroke="#bfdbfe" stroke-width="1"/>
  <line x1="180" y1="168" x2="180" y2="176" stroke="#bfdbfe" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="105" cy="200" r="16" fill="#64748b"/>
  <circle cx="105" cy="200" r="7" fill="#94a3b8"/>
  <circle cx="195" cy="200" r="16" fill="#64748b"/>
  <circle cx="195" cy="200" r="7" fill="#94a3b8"/>
  <!-- Ground line -->
  <rect x="50" y="216" width="200" height="2" rx="1" fill="#cbd5e1"/>

  <!-- Headline -->
  <text x="150" y="268" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0f172a" text-anchor="middle">New 2026 Models</text>

  <!-- Price -->
  <text x="150" y="296" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569" text-anchor="middle">Starting from</text>
  <text x="150" y="326" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800" fill="#2563eb" text-anchor="middle">$299/mo</text>

  <!-- Features -->
  <rect x="30" y="345" width="240" height="50" rx="6" fill="#f1f5f9"/>
  <g font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748b">
    <text x="65" y="365" text-anchor="middle">0% APR</text>
    <text x="150" y="365" text-anchor="middle">Free Service</text>
    <text x="235" y="365" text-anchor="middle">In Stock Now</text>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#2563eb" font-weight="700">
    <text x="65" y="382" text-anchor="middle">60 mos</text>
    <text x="150" y="382" text-anchor="middle">3 Years</text>
    <text x="235" y="382" text-anchor="middle">50+ Models</text>
  </g>
  <!-- Vertical dividers -->
  <line x1="108" y1="352" x2="108" y2="390" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="192" y1="352" x2="192" y2="390" stroke="#e2e8f0" stroke-width="1"/>

  <!-- CTA button -->
  <rect x="55" y="404" width="190" height="40" rx="6" fill="#2563eb"/>
  <text x="150" y="429" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">View Inventory</text>

  <!-- Footer -->
  <text x="150" y="450" font-family="Arial, Helvetica, sans-serif" font-size="0" fill="#9ca3af" text-anchor="middle"></text>
</svg>